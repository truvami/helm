{{- if and .Values.thanos.enabled .Values.thanos.storeGateway.enabled }}
{{- $name := include "truvami-monitoring.thanos.storeGateway.name" . -}}
{{- $secretName := include "truvami-monitoring.thanos.objstoreSecretName" . -}}
{{- $secretKey := include "truvami-monitoring.thanos.objstoreSecretKey" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels: {{- include "truvami-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: thanos-store-gateway
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 10902
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 10901
      targetPort: grpc
      protocol: TCP
  selector: {{- include "truvami-monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: thanos-store-gateway
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels: {{- include "truvami-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: thanos-store-gateway
spec:
  serviceName: {{ $name }}
  replicas: {{ .Values.thanos.storeGateway.replicas }}
  selector:
    matchLabels: {{- include "truvami-monitoring.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: thanos-store-gateway
  template:
    metadata:
      labels: {{- include "truvami-monitoring.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: thanos-store-gateway
    spec:
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: thanos
          image: "{{ .Values.thanos.image.repository }}:{{ .Values.thanos.image.tag }}"
          imagePullPolicy: {{ .Values.thanos.image.pullPolicy }}
          args:
            - store
            - --log.level={{ .Values.thanos.storeGateway.logLevel }}
            - --log.format=json
            - --http-address=0.0.0.0:10902
            - --grpc-address=0.0.0.0:10901
            - --data-dir=/var/thanos/store
            - --objstore.config-file=/etc/thanos/objstore.yml
          ports:
            - name: http
              containerPort: 10902
              protocol: TCP
            - name: grpc
              containerPort: 10901
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.thanos.storeGateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/thanos/store
            - name: objstore
              mountPath: /etc/thanos
              readOnly: true
      volumes:
        - name: objstore
          secret:
            secretName: {{ $secretName }}
            items:
              - key: {{ $secretKey }}
                path: objstore.yml
        {{- if not .Values.thanos.storeGateway.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.thanos.storeGateway.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.thanos.storeGateway.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.thanos.storeGateway.persistence.size }}
  {{- end }}
{{- end }}
