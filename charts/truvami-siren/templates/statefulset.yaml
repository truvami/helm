{{- $configuredRetryGroupID := (index .Values.siren.kafka "retry-group" "id") | default "" }}
{{- $retryGroupID := default (printf "%s-retry" .Release.Name) $configuredRetryGroupID }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "truvami-siren.fullname" . }}
  labels:
    {{- include "truvami-siren.labels" . | nindent 4 }}
    app.kubernetes.io/component: default
spec:
  serviceName: {{ include "truvami-siren.fullname" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "truvami-siren.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: default
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "truvami-siren.labels" . | nindent 8 }}
        app.kubernetes.io/component: default
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "truvami-siren.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "truvami-siren.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: default
      containers:
        {{- include "truvami-siren.containerSpec" (dict "root" . "component" "default" "retryGroupID" $retryGroupID) | nindent 8 }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.retry.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "truvami-siren.fullname" . }}-retry
  labels:
    {{- include "truvami-siren.labels" . | nindent 4 }}
    app.kubernetes.io/component: retry
spec:
  serviceName: {{ include "truvami-siren.fullname" . }}
  replicas: {{ .Values.retry.replicaCount }}
  selector:
    matchLabels:
      {{- include "truvami-siren.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: retry
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "truvami-siren.labels" . | nindent 8 }}
        app.kubernetes.io/component: retry
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "truvami-siren.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "truvami-siren.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: retry
      containers:
        {{- include "truvami-siren.containerSpec" (dict "root" . "component" "retry" "retryGroupID" $retryGroupID "alertsMode" "retry" "enableDeviceInactiveEvaluation" "false") | nindent 8 }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
