suite: statefulset
templates:
  - templates/statefulset.yaml
tests:
  - it: should render a StatefulSet with a container
    asserts:
      - isKind:
          of: StatefulSet
      - exists:
          path: spec.template.spec.containers[0].image
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: KAFKA_RETRY_GROUP_ID

  - it: should render a retry StatefulSet when enabled
    set:
      retry.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-truvami-siren-retry
          documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].args[3]
          value: /etc/truvami-siren/config.yaml
          documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].args[4]
          value: --alerts-mode
          documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].args[5]
          value: retry
          documentIndex: 1
