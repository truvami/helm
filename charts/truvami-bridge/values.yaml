# Default values for truvami-bridge.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

bridge:
  # Strimzi cluster name for Kafka resources
  cluster: "truvami-stack"

  metrics:
    port: 9090

  otel:
    enable: true
    endpoint: "tempo.grafana-tempo.svc.cluster.local:4318"

  topic: "truvami"

  idle:
    warn:
      threshold: 15m
    error:
      threshold: 1h

  validation:
    maxCapturedAtDrift: 1h

  grpc:
    server: truvami-stack-truvami-api:5001
    health:
      service: "" # empty means default gRPC server health

  locksmith:
    server: truvami-locksmith:5005
    requestTimeout: 2s
    health:
      service: "" # empty means default gRPC server health
    keyPrefix: "locksmith"

  valkey:
    host: "truvami-stack-valkey-primary:6379"
    username: "default"
    requestTimeout: 200ms

  kafka:
    bootstrap:
      servers:
        - truvami-stack-kafka-bootstrap:9093
    allow.auto.create.topics: false
    enable.ssl.certificate.verification: false
    ssl:
      ca:
        location: /var/run/secrets/kafka/ca.crt
    security:
      protocol: SSL
    consumer:
      session:
        timeout:
          ms: 45000 # 45 seconds - how long broker waits for heartbeat
      heartbeat:
        interval:
          ms: 3000 # 3 seconds - how often to send heartbeats
      max:
        poll:
          interval:
            ms: 300000 # 5 minutes - max time between polls
    alerts:
      topics:
        uplinks: alerts.uplinks
        positions: alerts.positions
        battery-statuses: alerts.battery-statuses
        rotations: alerts.rotations
        events: alerts.events
        sniffed-devices: alerts.sniffed-devices
      flush-timeout: 10s
      flush-remaining-timeout: 1s
    unauthorized:
      topic: bridge.unauthorized
    integrations:
      cache:
        duration: 1m

  featureFlags:
    # Holcim
    fed1a230-cee8-11ee-9ddb-47f5f8bdd1a5:
      doNotFallbackSetCapturedAt: true

  wifisolver:
    rssiRef: -35.0
    pathLossExp: 3.0
    outlierMaxDist: 500.0
    weiszfeldIter: 100
    baseRadius: 15.0
    matchCountExp: 0.5
    spreadWeight: 0.3
    rssiRangeWeight: 0.15
    meanRssiWeight: 0.1
    minAccuracy: 10.0
    maxAccuracy: 500.0

  lorasolver:
    rssiRef: -30.0
    pathLossExp: 2.7
    outlierMaxDist: 10000.0
    weiszfeldIter: 100
    baseRadius: 250.0
    matchCountExp: 0.5
    spreadWeight: 0.3
    rssiRangeWeight: 0.15
    meanRssiWeight: 0.1
    minAccuracy: 100.0
    maxAccuracy: 5000.0

  blesolver:
    rssiRef: -50.0
    pathLossExp: 2.5
    outlierMaxDist: 200.0
    weiszfeldIter: 100
    baseRadius: 10.0
    matchCountExp: 0.5
    spreadWeight: 0.3
    rssiRangeWeight: 0.15
    meanRssiWeight: 0.1
    minAccuracy: 5.0
    maxAccuracy: 300.0

  logging:
    level: info # debug, info, warn, error
    encoding: json # json, console
    time-encoder: iso8601 # rfc3339, iso8601, epoch

# Valkey secret
valkey:
  secretName: truvami-stack-valkey
  secretKey: valkey-password

kafka:
  topic:
    partitions: 12
    replicas: 3
    unauthorized: bridge.unauthorized
    config:
      retention.ms: 2592000000
      segment.bytes: 1073741824

  # Add additional ACLs to the KafkaUser created for the bridge
  additionalAcls: []
    # - host: '*'
    #   operations:
    #     - Read
    #     - Describe
    #   resource:
    #     name: additional-topic
    #     patternType: literal
    #     type: topic
    # - host: '*'
    #   operations:
    #     - Create
    #     - Describe
    #     - Write
    #   resource:
    #     name: another-topic
    #     patternType: literal
    #     type: topic

replicaCount: 1

image:
  repository: ghcr.io/truvami/bridge
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

serviceMonitor:
  enabled: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
readinessProbe:
  httpGet:
    path: /readyz
    port: metrics

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes:
  - configMap:
      defaultMode: 420
      name: "truvami-bridge-config"
      optional: false
    name: config
  - name: kafka-credentials
    secret:
      defaultMode: 420
      optional: false
      secretName: "truvami-bridge-kafka"

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - mountPath: /etc/truvami-bridge
    name: config
    readOnly: true
  - mountPath: /var/run/secrets/kafka
    mountPropagation: None
    name: kafka-credentials
    readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

initContainers: []
  # - name: check-network-access
  #   image: alpine/curl
  #   imagePullPolicy: IfNotPresent
  #   # If the curl commands returns a 400 or 200 the init container will exit with code 0
  #   command:
  #     [
  #       "sh",
  #       "-c",
  #       'curl -Iv -m 30 xyz.com | grep "400 Bad Request"',
  #     ]

pdb:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
