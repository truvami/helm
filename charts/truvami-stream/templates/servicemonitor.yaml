{{- if and .Values.serviceMonitor.enabled .Values.stream.metrics.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "truvami-stream.fullname" . }}
  labels:
    {{- include "truvami-stream.labels" . | nindent 4 }}
spec:
  jobLabel: k8s-apps
  selector:
    matchLabels:
    {{- include "truvami-stream.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  endpoints:
  - port: metrics
    interval: 15s
{{- end -}}
