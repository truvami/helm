apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "truvami-stream.fullname" . }}-test-connection"
  labels:
    {{- include "truvami-stream.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['http://{{ include "truvami-stream.fullname" . }}:{{ .Values.stream.server.port }}']
  restartPolicy: Never
